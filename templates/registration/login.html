{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Вхід" %} · {% trans "Складський облік" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="mb-3">{% trans "Вхід" %}</h1>
        <form method="post" class="card card-body">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">{% trans "Увійти" %}</button>
        </form>
    </div>
</div>
{% endblock %}
