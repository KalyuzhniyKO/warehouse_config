{% load i18n %}
{% if is_paginated %}
<nav aria-label="{% trans 'Навігація сторінками' %}">
    <ul class="pagination">
        {% if page_obj.has_previous %}
            <li class="page-item"><a class="page-link" href="?page={{ page_obj.previous_page_number }}">{% trans "Попередня" %}</a></li>
        {% endif %}
        <li class="page-item active"><span class="page-link">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span></li>
        {% if page_obj.has_next %}
            <li class="page-item"><a class="page-link" href="?page={{ page_obj.next_page_number }}">{% trans "Наступна" %}</a></li>
        {% endif %}
    </ul>
</nav>
{% endif %}
