<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll("form[data-disable-on-submit]").forEach(function (form) {
            form.addEventListener("submit", function () {
                var submitButton = form.querySelector("[data-submit-button]");

                if (!submitButton || submitButton.disabled) {
                    return;
                }

                submitButton.dataset.originalLabel = submitButton.textContent;
                submitButton.textContent = submitButton.dataset.savingLabel;
                submitButton.disabled = true;
            });
        });

        document.querySelectorAll("[data-qty-stepper]").forEach(function (stepper) {
            var input = stepper.querySelector("input");
            var decrement = stepper.querySelector("[data-qty-decrement]");
            var increment = stepper.querySelector("[data-qty-increment]");

            if (!input || !decrement || !increment) {
                return;
            }

            var normalizeQuantity = function () {
                var value = parseInt(input.value, 10);
                if (Number.isNaN(value) || value < 1) {
                    value = 1;
                }
                input.value = value;
                return value;
            };

            decrement.addEventListener("click", function () {
                input.value = Math.max(1, normalizeQuantity() - 1);
                input.dispatchEvent(new Event("change", { bubbles: true }));
            });
            increment.addEventListener("click", function () {
                input.value = normalizeQuantity() + 1;
                input.dispatchEvent(new Event("change", { bubbles: true }));
            });
            input.addEventListener("blur", normalizeQuantity);
            input.form && input.form.addEventListener("submit", normalizeQuantity);
            normalizeQuantity();
        });
    });
</script>
