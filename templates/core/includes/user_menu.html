{% load i18n core_extras %}
<div class="dropdown">
    <button class="btn user-menu-toggle dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <span class="user-avatar-badge">{{ display_name|first_letter }}</span>
        <span class="user-menu-name">{{ display_name }}</span>
        <span class="user-role-badge">{% if user.is_superuser %}{% trans "Власник" %}{% elif is_warehouse_admin %}{% trans "Адміністратор" %}{% else %}{% trans "Користувач" %}{% endif %}</span>
    </button>
    <div class="dropdown-menu dropdown-menu-end shadow user-menu-dropdown">
        {% if can_manage_users %}
            <a class="dropdown-item" href="{% url 'management_dashboard' %}">{% trans "Керування складом" %}</a>
            <a class="dropdown-item" href="{% url 'management_users' %}">{% trans "Користувачі та ролі" %}</a>
        {% endif %}
        {% if user.is_superuser %}
            <a class="dropdown-item" href="{% url 'management_audit' %}">{% trans "Журнал аудиту" %}</a>
        {% endif %}
        {% if user.is_staff %}
            <a class="dropdown-item" href="{% url 'admin:index' %}">{% trans "Панель адміністратора" %}</a>
        {% endif %}
        <div class="dropdown-divider"></div>
        <form method="post" action="{% url 'logout' %}" class="m-0">
            {% csrf_token %}
            <button class="dropdown-item text-danger" type="submit">{% trans "Вийти" %}</button>
        </form>
    </div>
</div>
